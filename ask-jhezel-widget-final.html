Q: Leverage and Margin
A: Q: What is Leverage and Margin?<br> A: <h2>What Leverage and Margin Mean</h2> Leverage allows traders to borrow money from the broker to open larger positions than their actual balance. For example, with 1:100 leverage, $100 can control a $10,000 trade.<br> Margin is the amount of your own money set aside as a security deposit for open trades. Higher leverage means less margin is required, but risk increases because price movements have a stronger impact on your balance.<br><br> <h2>How a Margin Call Happens</h2> When the market moves against your open trades, your account equity (balance plus profit or loss) drops. As it approaches the margin used, the margin level (Equity ÷ Margin × 100%) decreases. If it falls below the broker’s set threshold (e.g., 100% or 50%), a margin call occurs or positions may be automatically closed.<br> Example:<br> <table> <tr> <th>Balance</th> <th>Leverage</th> <th>Trade Size</th> <th>Margin Used</th> <th>Margin Level</th> <th>Status</th> </tr> <tr> <td>$1,000</td> <td>1:100</td> <td>$50,000</td> <td>$500</td> <td>200%</td> <td>Safe</td> </tr> <tr> <td>Equity: $600</td> <td>1:100</td> <td>$50,000</td> <td>$500</td> <td>120%</td> <td>Getting Close</td> </tr> <tr> <td>Equity: $450</td> <td>1:100</td> <td>$50,000</td> <td>$500</td> <td>90%</td> <td>Margin Call Triggered</td> </tr> </table><br> Formula:<br> Margin Level = (Equity ÷ Margin) × 100%<br><br> In short, leverage magnifies both profits and losses. If open losses become too large, available margin decreases, the margin level drops, and the broker may issue a margin call or close trades automatically.

Q: What is IRA, ROTH IRA, and 401k?
A: <b>Q:</b> What is IRA, ROTH IRA, and 401k?<br><b>A: <p><strong>Traditional IRA</strong> allows individuals to contribute pre-tax income toward investments that can grow tax-deferred until withdrawal. It’s ideal for traders who want to lower taxable income today while compounding untaxed growth until retirement. Withdrawals after age 59½ are taxed as ordinary income.</p> <p><strong>Roth IRA</strong> is designed for long-term, tax-free growth. Contributions are made with after-tax money, and all trading gains—whether from forex, stocks, or other investments—are completely tax-free when withdrawn at retirement. This structure is powerful for active traders who expect higher future income, since all future gains are shielded from taxes.</p> <p><strong>401(k)</strong> accounts are employer-sponsored and also grow tax-deferred. Most 401(k) plans invest in mutual funds, but some include a “brokerage window” that lets employees directly trade stocks or ETFs. When leaving a job, traders often roll their 401(k) into a Self-Directed IRA, unlocking access to forex and alternative assets.</p>

Q: Using Retirement Accounts for Forex Trading
A: <b>Q:</b> Using Retirement Accounts in Forex Trading?<br><b>A:</b> <h2>IRA • Roth IRA • 401(k)</h2> <p>How active traders can build tax-advantaged wealth through self-directed structures.</p> <p>You can use your retirement accounts — including Traditional IRA, Roth IRA, and 401(k) — to trade forex through a Self-Directed Custodian. This allows you to grow trading profits tax-deferred (IRA/401k) or tax-free (Roth IRA) instead of paying annual taxes on each profitable trade.</p> <p>If the current IRA custodian does not permit or directly facilitate forex trading, clients need to open a <em>Self-Directed IRA</em> through a specialized custodian that allows alternative assets such as forex, crypto, or futures. The Self-Directed IRA gives you the flexibility to link with an approved forex broker, while keeping all trades and funds inside the IRA structure for IRS compliance. This can be done through their existing custodian, if supported but if not, the client might need to open a new IRA with a custodian that does.</p> <h2>Account Comparison for Forex Trading</h2> <table> <tr><th>Account Type</th><th>Tax Treatment</th><th>Withdrawal Rules</th><th>Forex Eligibility</th><th>Ideal Use</th></tr> <tr><td>Traditional IRA</td><td>Contributions are pre-tax → growth is tax-deferred; taxed at withdrawal</td><td>Penalty before 59½</td><td>Yes, with a self-directed custodian</td><td>Long-term traders seeking lower taxable income today</td></tr> <tr><td>Roth IRA</td><td>Contributions after-tax → all future growth is tax-free</td><td>Tax-free after 59½</td><td>Yes, self-directed only</td><td>Traders expecting higher income later (maximize future tax-free growth)</td></tr> <tr><td>401(k)</td><td>Employer-sponsored, tax-deferred growth</td><td>Penalty before 59½ unless rollover</td><td>Limited: needs to be rolled into a Self-Directed IRA for forex</td><td>Employees rolling over funds for more control</td></tr> </table> <h2>Key Benefits of Using a Retirement Account in Forex Trading</h2> <h3>Tax Shield on Trading Profits</h3> <p>Forex profits are normally taxed as ordinary income (up to 37% in the U.S.).</p> <p>Inside a Traditional IRA or 401(k) → taxes are deferred until retirement.</p> <p>Inside a Roth IRA → profits are never taxed when withdrawn correctly.</p> <p>Example:<br> $100,000 account earning 12% annually for 10 years</p> <ul> <li>Taxable account: ~$233,000 after taxes</li> <li>IRA/Roth: ~$310,000 retained (no tax drag)</li> </ul> <h3>Faster Compound Growth</h3> <p>By avoiding yearly taxation, gains are fully reinvested — leading to exponential growth over time. Every dollar stays working inside the account until withdrawal.</p> <h3>Broader Diversification</h3> <p>Forex allows exposure to global currencies (USD, EUR, JPY, GBP, etc.), reducing reliance on traditional stocks and bonds. This makes the IRA or 401(k) portfolio more resilient to U.S. market downturns.</p> <h3>Retirement-Focused Risk Management</h3> <p>Trading inside a retirement account encourages long-term discipline, controlled leverage, and structured position sizing. Because the funds are protected by retirement restrictions, impulsive withdrawals are less likely.</p> <h3>Regulatory & Custodial Oversight</h3> <p>Assets are held by an IRS-approved custodian under the IRA/401k structure. This provides both asset protection and reporting compliance (Forms 5498, 1099-R, etc.). Funds remain legally distinct from personal assets.</p> <h2>Important Considerations</h2> <table> <tr><th>Limitation</th><th>Details</th></tr> <tr><td>No personal use</td><td>You cannot personally guarantee loans, use margin from your own funds, or commingle money.</td></tr> <tr><td>Margin restrictions</td><td>Some custodians limit or disallow leverage due to IRS debt-financing rules (UBTI).</td></tr> <tr><td>Withdrawal penalties</td><td>Withdrawals before 59½ trigger taxes + 10% penalty unless qualified exception.</td></tr> <tr><td>Custodian compatibility</td><td>Only self-directed custodians allow forex; major brokerages (Fidelity, Schwab) do not.</td></tr> <tr><td>Possible UBTI exposure</td><td>Using borrowed funds inside the IRA may trigger Unrelated Business Taxable Income.</td></tr> </table> <h2>Example Strategy Path</h2> <p>Scenario:<br> John, age 45, rolls his $150,000 401(k) into a Self-Directed IRA with a custodian that supports forex. He opens a trading account titled “Midland Trust Company FBO John Doe IRA #1034921” and connects it to a regulated broker.</p> <p>He trades EUR/USD and GBP/USD moderately, earning 10% yearly. After 10 years → $389,000 balance, no taxes paid until retirement.<br> If done in a taxable account → ~$310,000 after taxes.</p> <h2>Custodians Commonly Used for Forex Trading IRAs</h2> <ul> <li>Midland Trust Company — allows Forex & Futures (Self-Directed IRA)</li> <li>Equity Trust Company — collaborates with brokers for forex access</li> <li>IRA Financial Trust — specializes in alternative assets (crypto, forex, etc.)</li> <li>Kingdom Trust — supports global trading structures</li> </ul> <h2>Summary Table</h2> <table> <tr><th>Benefit</th><th>Traditional IRA</th><th>Roth IRA</th><th>401(k)</th></tr> <tr><td>Tax on Growth</td><td>Deferred</td><td>None</td><td>Deferred</td></tr> <tr><td>Early Withdrawal Penalty</td><td>Yes</td><td>Yes (before 59½)</td><td>Yes</td></tr> <tr><td>Forex Access</td><td>Self-Directed</td><td>Self-Directed</td><td>Via Rollover</td></tr> <tr><td>Custodian Required</td><td>Yes</td><td>Yes</td><td>Yes</td></tr> <tr><td>Best For</td><td>Tax Deferral</td><td>Tax-Free Growth</td><td>Employer Rollovers</td></tr> <tr><td>Compounding Advantage</td><td>⭐⭐⭐</td><td>⭐⭐⭐⭐</td><td>⭐⭐⭐</td></tr> </table> <h2>Bottom Line</h2> <p>Trading forex within a retirement account (IRA, Roth IRA, or 401k rollover) lets you:</p> <ul> <li>Keep all profits growing inside a tax shelter</li> <li>Diversify beyond stocks and ETFs</li> <li>Legally protect assets</li> <li>Build long-term wealth through active global strategies</li> </ul> <p>The key is finding the right custodian and broker pair that fully supports IRA forex accounts.</p>

Q: Equity Monitors
A: Q: What are Equity Monitors?<br> A: Equity monitors let you trigger an alert or action when your account reaches a specific equity level, either above or below your current equity. You can choose actions such as sending an email alert, disabling copiers, or closing trades.<br><br> The page has two tabs:<br> - Active: shows monitors currently running.<br> - Concluded: shows monitors that have triggered or were cancelled. You can create or cancel a monitor, but you cannot edit or delete it.<br><br> Types of Equity Monitors<br> 1. Target Value – Triggers ABOVE your current equity at a specific value.<br> Example: Equity 10,000 → trigger at 11,000.<br> 2. Target Percentage – Triggers ABOVE your current equity by percentage.<br> Example: Equity 10,000 → 10% increase = 11,000 (enter 110%).<br> 3. Protect Value – Triggers BELOW your current equity at a specific value.<br> Example: Equity 10,000 → trigger at 9,000.<br> 4. Protect Percentage – Triggers BELOW your current equity by percentage.<br> Example: Equity 10,000 → 10% drop = 9,000 (enter 90%).<br><br> There are three actions:<br> - Email alert: Sends an alert when equity level is reached.<br> - Email alert and disable copiers: Sends an alert and disables trade copiers.<br> - Email alert, disable copiers and close trades: Sends an alert, disables copiers, and closes all open trades.

SECTION 4: STT / MT4 / MT5 ERROR CODES & TROUBLESHOOTING
==================================================
--- 10031 No connection with the trade server ---
This error message means there is a disconnection between STT and the broker server. This kind of alert can be disregarded since the STT is designed to reconnect automatically.<p><b><i>Email Response</i></b></p><p>This error means that STT is currently unable to connect to the broker’s trade server. When you see “MT Error: 10031 No connection with the trade server”, it indicates that the command that STT just tried, such as opening or closing a trade, could not be processed because there’s no active connection at that moment.</p><p>The platform is designed to automatically retry the command every second. Once the connection is re-established, whether through your internet stabilizing or the broker’s server coming back online, the action will go through without any additional steps from you.</p>

--- close/open volume less than minimum ---
This error message means that STT was not able to copy the action from the master for closing a trade. This normally happens if the volume of the order is not suitable for the client's account.<p><b><i>Email Response</i></b></p><p>For this type of error, we can disregard it. According to our developers, this occurs when the follower account’s balance is significantly lower than the master account’s balance. In such cases, the system intelligently skips smaller positions that would otherwise result in negligible profits. These positions are typically too small to be meaningful or cost-effective once transaction costs and slippage are taken into account.</p><p>Skipping these trades helps ensure better efficiency and trading relevance on lower-balance accounts.</p>

--- skipped trades ---
Orders were being skipped because it's not necessary for the client's account size.<p><b><i>Email Response</i></b></p><p>You may notice that certain trades are being skipped. This happens because your account balance is significantly smaller compared to the master account. The system avoids unnecessary micro-lot orders that don’t align with your balance.</p>

--- Account Disconnection ---
This happens when the live trading account gets disconnected from the STT itself which might be because of a master password update or broker server change.<p><b><i>Email Response</i></b></p><p>This behavior can sometimes occur if there is ongoing broker maintenance. When this happens, the system should automatically reconnect once the maintenance is complete. <p>To confirm everything is working properly, please follow these steps:</p> 1. Log in to your STT Dashboard and go to Accounts to check if the green checkmark is visible on the left side of the ID number. <p>2. Then go to Trade Copiers and make sure the green play button is also showing on the right side of the copier.</p> <p>If both indicators are present, your account should be fully operational. If not, please book a meeting using the link below so we can assist you and resolve the issue:(CALENDAR LINK)</p> <p>Thank you, and feel free to reach out if you need any further help! </p>

--- 10006 Request rejected ---
This means the trading server rejected the command to close/open the trade. Common reasons include broker-side restrictions, temporary server delays, or the trade being in a state that prevents it from closing immediately. The system automatically retries every second until it executes.

--- Trade is beyond copier defined slippage settings ---
The price difference (slippage) between the master and follower was too large, exceeding the copier’s slippage tolerance. This protects against poor entries during fast moves; the copier retries each second until back within range.

--- Error Code 10046 ---
This happens because the <i>opposite positions on a single symbol are disabled</i> rule is set for the trading account. For example, if the account has a buy position, then a user cannot open a sell position or place a pending sell order. Ther rule is only applied to acounts with hedging accounting system.<p><b><i>Email Response</i></b></p><p>Hi (client),</p> <p>The error you’re seeing — “opposite positions on a single symbol are disabled” — is happening because your R-S15 FIFO account is with a US-based broker (Forex.com).</p> <p>Here’s what it means in simple terms:</p> <p>• Your account cannot hold both a buy and a sell position on the same symbol at the same time.</p> <p>• For example, if there’s an open buy on EURGBP, the system cannot open a sell position until that buy is closed.</p> <p>• Pending orders in the opposite direction are also blocked until existing positions are closed.</p> <p>• This is a regulatory requirement for US brokers and cannot be overridden by the system.</p> <p>Because of this rule, the Social Trader Tool (STT) will re-attempt the command every minute, but it will only execute once the existing position is closed or reversed.</p>

--- Error Code: 136 / Off quotes ---
The trade didn’t open because the broker couldn’t provide a valid price at the exact moment the order was sent (Error 136: Off Quotes). This usually happens during fast market movement or low liquidity. The system will keep retrying every second, and the trade will only execute once a stable quote is available; otherwise, it may be skipped. This is not an issue with your account or the copier connection.<p><b><i>Email Response</i></b></p><p>The system successfully sent the order, however it was rejected by the broker due to Error Code 136 (Off Quotes). This means that at the moment the trade was placed, the broker could not provide a valid executable price—typically caused by rapid price movement, spread changes, or temporary liquidity conditions.</p> <p> What to expect:</p> <p>•The system will automatically retry the trade once every second.</p> <p>•The trade will execute as soon as a valid quote becomes available and market conditions stabilize.</p> <p>•If the broker continues rejecting quotes due to volatility, the trade may be skipped for that specific entry.</p> <p>Please note this does not indicate an issue with your account or the copier connection, and no funds were lost from this particular trade attempt.</p> <p>If you’d like, we can also review your execution settings (such as slippage tolerance and risk parameters) to reduce the likelihood of this occurring during high-volatility periods.</p>

--- Error Code 10027 ---
This type of error can be safely disregarded. According to our development team, it typically arises when the system identifies certain positions as insufficiently profitable for execution on the follower account. In these instances, the system intelligently bypasses trades with minimal projected outcomes, factoring in transaction costs, spreads, and slippage. <p></p> By skipping these trades, we enhance overall trading efficiency, ensuring that only positions with significant profit potential are executed. This approach minimizes exposure to unnecessary risk associated with low-value trades.

SECTION 6.5: OBJECTION HANDLING / CLIENT EXPLANATIONS
==================================================
--- DEVELOPERS / AGT PARTNERSHIP ---
Ridge partners with AGT / QuantLC (do NOT volunteer the company names to
clients) - a regulated company with a legitimate asset management
license. AGT manages and transfers trade positions across client
accounts, ensuring consistent, accurate, transparent execution. AGT
oversees physical trading servers in the U.S. and London (reliability,
low latency, regulatory standards). Every Ridge product is proprietary
and belongs solely to Ridge; not available anywhere else.

--- IB COMMISSIONS ---
Ridge does NOT earn commissions from client trading activity and does
not collect broker fees or IB commissions. AGT collects Introducing
Broker (IB) fees, which fund server infrastructure, compliance, and
operational stability.

--- CFD / OX SECURITIES / U.S. CLIENTS ---
Ox Securities operates as an international broker and is not registered
with the CFTC. Backend uses a CFD execution model but trading centers on
standard forex pairs with comparable conditions/liquidity. Trustpilot
withdrawal complaints usually stem from individual account setup,
banking channels, or compliance, not broker reliability; hundreds of
clients have deposited and withdrawn successfully. CFDs are restricted
for U.S.-BASED BROKERS, not for individuals using foreign platforms;
U.S. residents may legally maintain offshore accounts if they comply
with tax and reporting rules.

--- R-A10 FIFO vs NON-FIFO ---
FIFO version will not operate identically to non-FIFO due to regulatory
requirements (adjusted strategy structure, currency pair connectivity,
risk controls). Nothing is wrong with the system; differences are
expected. Non-FIFO option is available if the client prefers.

--- GBPJPY DRAWDOWN CONTEXT (R-C30 etc.) ---
Perspective matters: a newer account was up 35% on deposit in four
months. Open GBPJPY positions represented about 3.6% DD on initial
deposit. Margin-out requires 100% DD. Clients who over-leveraged will be
paranoid no matter what; responsible deposits should be left alone to
compound for YEARS. Analyzing trades/news is the developers' and
algorithms' responsibility, not the client's.

--- RC30 BITCOIN DOUBLE-POSITION ISSUE ---
On September 10 the central C30 server opened a BTCUSD long for 3
seconds. Some client accounts (all on OX Securities) opened the position
TWICE; the duplicate had no corresponding server position so no sell
signal was ever sent, leaving it open. Client options: 1) close the
position (realized loss), or 2) hold as a long-term BTC long. The
position will NOT close automatically; it must be closed manually. Ridge
is building a monitoring platform to alert if client accounts deviate
from the master for more than a few minutes.

--- R-A10 AUD/CAD VOLATILITY ---
Geopolitical events (incl. Venezuela developments affecting oil and the
Canadian dollar) drove volatility. AUD/CAD approached major resistance
near 0.98000; preemptive liquidation not prudent; system closes
positions individually on retracement. A10 risk exposure was reduced;
10-year back-test max drawdown ~20.1%. Ridge was one of the few firms
net positive on all products except one for 2025 (vs. major funds'
losses). Emphasize diversification and prudent account sizing; Ridge
cannot give personalized sizing advice - refer to a qualified financial
advisor. Rule of thumb: if exposure causes lost sleep, position size is
too large.

--- R-A10 EQUITY PROTECTION ---
RA10 has NO fixed built-in equity protection level; clients control
their own drawdown allowance. 30% equity protection generally
recommended for 1:1 risk setting; adjust if risk settings increase.

--- R10 NOT OPENING TRADES ---
R10 pauses new trades when it reaches 5% drawdown - defensive mode
prioritizing capital preservation. Risk control mechanism + market
condition filter. No trades can be a sign the risk filter is working.

--- RS15 HOLDING TRADES OVERNIGHT/DAYS ---
RS15/Centurion is intraday by design, but may hold positions longer when
exit conditions are not met, prioritizing protection over forcing an
early close that locks in losses.

--- FLOATING P/L AND DRAWDOWN (general) ---
Floating P/L = open positions, NOT realized losses. Strategies actively
hedge; exposure balanced across positions. Client's drawdown may differ
from master (trades taken at different balances, balance adjustments,
old positions, past multiplier usage). Drawdowns can last days or weeks
- normal. Patience and trust in the process.

--- CORE FAQ ANSWERS (drawdown anxiety) ---
- Drawdown is not a loss. Systems historically win ~70-80% of positions.
- All Ridge systems have a -30% equity protector engaged around the
  clock on the master (at 2X risk that means -60% on the client account
  - one reason higher risk settings are not recommended). Only one
  system ever hit that stop (April, Trump tariff announcement).
- Client's account is always under their control; only they can deposit
  and withdraw. They can close positions or take profits manually, but
  doing so can impact strategy performance over time.
- Changing risk settings only affects FUTURE trades, not open positions.
- Never trade with money you cannot afford to lose. If losing sleep, the
  account is over-leveraged. To downsize: withdraw SLOWLY over time, not
  all at once (a 50% withdrawal doubles current drawdown percentage
  because open trades were sized on the original balance).
- No Ridge client account has ever been blown/gone to zero; the -30%
  equity protector prevents this.
- AI systems rely on historical statistical analysis (150,000+ data
  points); they cannot eliminate risk and need market stability to adapt.
  Results are judged over months and years, not days and weeks.
- What causes drawdowns: market movements against open positions,
  influenced by political events, financial news, institutional
  activity. Small losses (3-4%) are normal and recoverable.

--- VERTUS / "WHY ISN'T THE AI ADAPTING" ---
The AI analyzes price movements and adjusts positioning over time, but
consecutive market disruptions have not given it stable conditions to
adapt. It is intentionally slowing activity and avoiding unnecessary
entries in high volatility. When the market stabilizes, it can perform
at potential. AI is adaptive but not perfect and relies on market
stability.

--- MAVEN (VELANTRA) LIQUIDATION Q&A ---
- Maven journey concluded after extreme AUD/CAD volatility; drawdowns
  exceeded historical max levels (running since 2018, but not in a
  sustained 10x environment). Not a system failure: predefined risk
  limits were reached; risk containment capped the loss ("you lost 10 -
  not everything").
- Maven is a modified grid strategy, NOT Martingale. Master account
  since 2018 uses the same strategy.
- Different accounts liquidated differently due to entry timing, balance
  changes, old positions, past multipliers.
- Waiting for recovery isn't always efficient; volatility could persist
  (potentially 2-5 years). 10x structure = defined loss, clean restart,
  reduced out-of-pocket exposure.
- 10x is only better with sound financial decisions: it lets a client
  put 1/10 of capital at risk for the same trading account size and
  diversify the rest. Using $100K to get a $1M account is NOT the
  recommended use.
- Clients can restart immediately (with or without 10x) or transition to
  True AI systems (different sub-system-level risk management, higher
  minimum starting balance). No pressure to act immediately.

  // ================= WIDGET LOGIC =================
  const launcher = document.getElementById("aj-launcher");
  const panel = document.getElementById("aj-panel");
  const closeBtn = document.getElementById("aj-close");
  const messagesEl = document.getElementById("aj-messages");
  const inputEl = document.getElementById("aj-input");
  const sendBtn = document.getElementById("aj-send");

  // Conversation history (Gemini format)
  const history = [];
  let greeted = false;

  function open() {
    panel.classList.add("aj-open");
    launcher.style.display = "none";
    if (!greeted) {
      addMsg("bot", "Hi! I'm AI Jhezel. Ask me anything about our processes, policies, or how we do things. What do you need help with?");
      greeted = true;
    }
    inputEl.focus();
  }
  function close() {
    panel.classList.remove("aj-open");
    launcher.style.display = "flex";
  }
  launcher.addEventListener("click", open);
  closeBtn.addEventListener("click", close);

  function addMsg(role, text, typing) {
    const div = document.createElement("div");
    div.className = "aj-msg aj-" + (role === "user" ? "user" : "bot") + (typing ? " aj-typing" : "");
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = "";
    inputEl.style.height = "auto";
    sendBtn.disabled = true;

    addMsg("user", text);
    history.push({ role: "user", parts: [{ text }] });

    const typingEl = addMsg("bot", "Typing...", true);

    try {
      const res = await fetch(
        "https://generativelanguage.googleapis.com/v1beta/models/" +
          MODEL + ":generateContent",
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-goog-api-key": GEMINI_API_KEY
          },
          body: JSON.stringify({
            system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
            contents: history,
            generationConfig: { maxOutputTokens: 800, temperature: 0.4 }
          })
        }
      );

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error && err.error.message ? err.error.message : "Request failed (" + res.status + ")");
      }

      const data = await res.json();
      const reply =
        data.candidates &&
        data.candidates[0] &&
        data.candidates[0].content &&
        data.candidates[0].content.parts
          ? data.candidates[0].content.parts.map(p => p.text || "").join("")
          : "Sorry, I couldn't generate a response. Please try again.";

      typingEl.remove();
      addMsg("bot", reply);
      history.push({ role: "model", parts: [{ text: reply }] });

      // Keep history from growing forever (keeps last 20 turns)
      if (history.length > 40) history.splice(0, history.length - 40);
    } catch (e) {
      typingEl.remove();
      addMsg("bot", "Something went wrong: " + e.message + "\n\nCheck that the API key is set correctly, then try again.");
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  sendBtn.addEventListener("click", send);
  inputEl.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });
  inputEl.addEventListener("input", function () {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 96) + "px";
  });
})();
